# Secrets template for VeloBid + Hermes on K8s.
# Replace values with base64-encoded secrets before applying.
#
# Generate:
#   echo -n "velobid-internal" | base64
#   echo -n '{"version":1,"credential_pool":{...}}' | base64
#
# Better approach: use SealedSecrets or External Secrets Operator
# for GitOps-safe secret management.
---
apiVersion: v1
kind: Secret
metadata:
  name: velobid-secrets
  namespace: velobid
type: Opaque
data:
  # echo -n "velobid-internal" | base64
  HERMES_API_KEY: dmVsb2JpZC1pbnRlcm5hbA==
  # Replace with: echo -n '<credential-pool-json>' | base64 -w0
  HERMES_CREDENTIALS_JSON: 
