# Tailscale Ingress (preserves existing funnel setup)
# Requires: tailscale-operator installed in cluster
# Alternative: standard nginx ingress (uncomment the second section)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: velobid-tailscale
  namespace: velobid
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/funnel: "true"
spec:
  ingressClassName: tailscale
  rules:
    - host: velobid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: velobid
                port:
                  number: 8000
---
