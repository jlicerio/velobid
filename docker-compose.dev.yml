services:
  velobid:
    build: .
    container_name: velobid-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - shared_data:/data/velobid
    environment:
      PYTHONUNBUFFERED: "1"
      VELOBID_DEV_MODE: "1"
    command:
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/api
      - --reload-dir
      - /app/bid_engine
      - --reload-dir
      - /app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/meta"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: node:22-bookworm-slim
    container_name: velobid-frontend-dev
    working_dir: /workspace/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/frontend/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://velobid:8000
    command:
      - sh
      - -lc
      - npm install && npm run dev -- --host 0.0.0.0
    depends_on:
      velobid:
        condition: service_healthy

  hermes:
    profiles: ["hermes"]
    build: ./hermes
    container_name: hermes-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8644:8642"
      - "127.0.0.1:8640:8640"
    volumes:
      - hermes_data:/root/.hermes
      - shared_data:/data/velobid
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: ${HERMES_API_KEY:-velobid-internal}
      ADMIN_PORT: "8640"
      HERMES_MODEL: ${HERMES_MODEL:-deepseek-v4-flash}
      HERMES_PROVIDER: ${HERMES_PROVIDER:-opencode-go}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-https://opencode.ai/zen/go/v1}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    depends_on:
      velobid:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer ${HERMES_API_KEY:-velobid-internal}", "http://localhost:8642/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shared_data:
  hermes_data:
  frontend_node_modules:
