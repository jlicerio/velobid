services:
  velobid-tailscale:
    image: tailscale/tailscale:latest
    container_name: velobid-tailscale
    hostname: velobid-tsnode
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_HOSTNAME=${TAILSCALE_HOSTNAME:-velobid}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_ACCEPT_DNS=false
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=${TAILSCALE_EXTRA_ARGS:-}
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
    volumes:
      - ${TAILSCALE_STATE_DIR:-/srv/velobid/tailscale}:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw

  velobid-tailnet-proxy:
    image: nginx:alpine
    container_name: velobid-tailnet-proxy
    restart: unless-stopped
    depends_on:
      - velobid
      - velobid-tailscale
    network_mode: service:velobid-tailscale
    volumes:
      - ./deploy/tailscale/nginx.conf:/etc/nginx/conf.d/default.conf:ro
